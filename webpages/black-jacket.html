<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

"></script>
    <link href="
https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/fontawesome.min.css
" rel="stylesheet">
    <link rel="stylesheet" href="../styles/reset.css">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/product.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/dheereshag/coloured-icons@1.9.6/app/ci.min.css">
    <script src="../scripts/components/header.js" defer></script>
    <script src="../scripts/components/footer.js" defer></script>

<body>
    <!-- Header -->
    <header-component></header-component>
    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="product">
                <div class="product-left">
                    <img src="../images/products/black-jacket.png" alt="Black Jacket" class="product-image">
                </div>
                <div class="product-right">
                    <h3>
                        Opium Antagonist Tour 2.0 Long Sleeve | Black Jacket
                    </h3>
                    <p>
                        3.5
                        <!-- Rating -->
                        <i class="fa fa-star checked"></i>
                        <i class="fa fa-star checked"></i>
                        <i class="fa fa-star checked"></i>
                        <i class="fa fa-star-half-stroke checked"></i>
                        <i class="fa-regular fa-star"></i>
                        (574)
                    </p>
                    <div class="price">
                        <sup>$</sup>299<sup>99</sup>
                    </div>
                    <div class="button add-to-cart">
                        <a href="#">
                            <p>Add to cart</p>
                        </a>
                    </div>
                    <div class="button buy-now">
                        <a href="#">
                            <p>Buy Now</p>
                        </a>
                    </div>
                </div>
            </div>

            <!-- More Products -->
            <div class="subheading">
                <h2>
                    More Products
                </h2>
            </div>

            <!-- Product Carousel -->
            <div class="product-carousel">
                <div class="product-card">
                    <a href="#">
                        <img src="../images//products/white-shirt.png" alt="Product" class="product-card-image">
                    </a>
                    <a href="#" class="product-card-link">
                        Add to Cart
                    </a>
                </div>
                <div class="product-card">
                    <a href="">
                        <img src="../images//products/leather-pants.png" alt="Product" class="product-card-image">
                    </a>
                    <a href="#" class="product-card-link">
                        Add to Cart
                    </a>
                </div>
                <div class="product-card">
                    <a href="">
                        <img src="../images//products/jacket.png" alt="Product" class="product-card-image">
                    </a>
                    <a href="#" class="product-card-link">
                        Add to Cart
                    </a>
                </div>
                <div class="product-card">
                    <a href="">
                        <img src="../images//products/hat.png" alt="Product" class="product-card-image">
                    </a>
                    <a href="#" class="product-card-link">
                        Add to Cart
                    </a>
                </div>
                <div class="product-card">
                    <a href="">
                        <img src="../images//products/boots.png" alt="Product" class="product-card-image">
                    </a>
                    <a href="#" class="product-card-link">
                        Add to Cart
                    </a>
                </div>
            </div>
        </div>
        <!-- BG Stickers -->
        <div class="stickers-bg">
            <img src="../images/stickers/pbc-sticker1.png" alt="" class="sticker1">
            <img src="../images/stickers/pbc-sticker2.png" alt="" class="sticker2">
            <img src="../images/stickers/pbc-sticker3.png" alt="" class="sticker3">
        </div>
    </main>
    <!-- Footer -->
    <footer-component></footer-component>

</html>
